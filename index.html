<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <Title>Title - Company Name</Title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        /* Header */
        .header {
            background-color: #ffffff; /* header背景白色 */
            padding: 20px 0;
            display: flex;
            justify-content: center; /* logo居中 */
            align-items: center;
        }

        .header .logo {
            height: 50px;
        }

        .nav-container a {
            text-decoration: none;
        }

        /* Main content */
        .main {
            padding: 40px 20px;
            text-align: center;
        }

        .main h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ff6200; /* 主标题颜色 */
        }

        .main p.description {
            font-size: 16px;
            margin-bottom: 30px;
            color: #ff6200; /* 描述颜色 */
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            font-size: 16px;
            color: white;
            background-color: #ff6200; /* 按钮主色 */
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #ea5a00; /* hover颜色 */
        }
    </style>
</head>
<body>

    <!-- Header with logo centered -->
    <header class="header">
        <div class="nav-container">
            <a href="index.html">
                <img src="logo1.png" alt="Company Logo" class="logo">
            </a>
        </div>
    </header>

    <!-- Main content -->
    <div class="main">
        <h1>Title</h1>
        <p class="description">Title</p>

        <p>
            <a class="btn" href="Hyperwave Platform design calculation report endorsed.pdf" target="_blank">Open PDF</a>
            <a class="btn" href="Hyperwave Platform design calculation report endorsed.pdf" download>Download PDF</a>
        </p>
    </div>

</body>
</html>
